name: mobile
description: "DevVault Mobile - React Component Vault"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # HTTP & Storage
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  
  # State Management
  provider: ^6.1.1
  
  # UI & Styling
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  
  # Syntax Highlighting
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  
  # WebView for Component Preview
  webview_flutter: ^4.5.0
  
  # Utilities
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
